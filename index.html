<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mirai</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()">Dark Mode</button>
    <div class="brand-wrap">
      <img src="assets/mirai-logo.svg" alt="Mirai logo" class="brand-logo" />
      <h1>Mirai</h1>
      <p><span>未来</span> • Learn. Remember. Use.</p>
    </div>
  </header>

  <nav>
    <button class="active" onclick="showSection('home', this)">Home</button>
    <button onclick="showSection('mission', this)">Daily Mission</button>
    <button onclick="showSection('vocab', this)">Vocabulary</button>
    <button onclick="showSection('grammar', this)">Grammar</button>
    <button onclick="showSection('kanji', this)">Kanji</button>
    <button onclick="showSection('flashcards', this)">Flashcards</button>
    <button onclick="showSection('sentence', this)">Sentence Practice</button>
    <button onclick="showSection('quiz', this)">Quiz</button>
    <button onclick="showSection('journal', this)">Journal</button>
  </nav>

  <main>
    <input id="search" placeholder="Search Japanese, hiragana, or English..." oninput="render()" />
    <section id="content">
      <div class="card hero">
        <h2>Loading...</h2>
        <p>Your Japanese study data is loading.</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
